# =====================================================================
# Konfigurasi Nginx untuk Jak Sanggar (frontend SPA)
# Diletakkan di VPS oleh skrip setup-vps.sh menjadi:
#   /etc/nginx/sites-available/jak-sanggar
# Placeholder __DOMAIN__ dan __ROOT__ akan diganti otomatis.
# =====================================================================

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    root __ROOT__;
    index index.html;

    # Logs
    access_log /var/log/nginx/jak-sanggar.access.log;
    error_log  /var/log/nginx/jak-sanggar.error.log;

    # Maksimum ukuran upload (untuk gambar via Buku Kas / Info Budaya)
    client_max_body_size 25M;

    # Aset statis dengan hash (file -<hash>.js / .css) -> cache panjang
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # SPA fallback: semua route React diserahkan ke index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;
}
