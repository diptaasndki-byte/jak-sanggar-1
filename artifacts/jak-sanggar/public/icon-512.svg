<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1834"/>
      <stop offset="0.55" stop-color="#11224a"/>
      <stop offset="1" stop-color="#1a1442"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5d27a"/>
      <stop offset="0.55" stop-color="#d4a64e"/>
      <stop offset="1" stop-color="#a07a2a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#d4a64e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#d4a64e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background tile -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Soft gold glow -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)"/>

  <!-- Batik tumpal accents -->
  <g fill="none" stroke="#d4a64e" stroke-opacity="0.18" stroke-width="2">
    <path d="M70 420 L130 300 L190 420 Z"/>
    <path d="M170 420 L230 300 L290 420 Z"/>
    <path d="M270 420 L330 300 L390 420 Z"/>
    <path d="M370 420 L430 300 L490 420 Z" transform="translate(-40 0)"/>
    <path d="M70 92 L130 212 L190 92 Z"/>
    <path d="M170 92 L230 212 L290 92 Z"/>
    <path d="M270 92 L330 212 L390 92 Z"/>
  </g>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#gold)" stroke-width="3" stroke-opacity="0.85"/>
  <circle cx="256" cy="256" r="138" fill="none" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.45"/>

  <!-- Monogram JS -->
  <g font-family="'Playfair Display', Georgia, serif" font-weight="700" fill="url(#gold)" text-anchor="middle">
    <text x="256" y="305" font-size="180" letter-spacing="-6">JS</text>
  </g>

  <!-- Tiny crown of dots (sanggar) -->
  <g fill="url(#gold)">
    <circle cx="256" cy="118" r="6"/>
    <circle cx="220" cy="128" r="4"/>
    <circle cx="292" cy="128" r="4"/>
    <circle cx="184" cy="148" r="3"/>
    <circle cx="328" cy="148" r="3"/>
  </g>

  <!-- Bottom slogan band -->
  <g font-family="'Inter', sans-serif" font-weight="600" fill="#f5d27a" text-anchor="middle">
    <text x="256" y="438" font-size="22" letter-spacing="6">JAK SANGGAR</text>
  </g>
</svg>
